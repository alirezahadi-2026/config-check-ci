name: Config Check CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@4

      - name: Show files
        run: ls -la

      - name: Make script executable
        run: chmod +x scripts/check-config.sh

      - name: Run config check
        run: ./scripts/check-config.sh
